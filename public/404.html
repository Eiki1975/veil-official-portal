<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex" />
    <title>VEIL OFFICIAL SITE</title>
    <script>
      const base = "/veil-official-portal";
      const path = location.pathname.startsWith(`${base}/`)
        ? location.pathname.slice(base.length)
        : "/";
      location.replace(`${base}/?path=${encodeURIComponent(path + location.search + location.hash)}`);
    </script>
  </head>
  <body></body>
</html>
